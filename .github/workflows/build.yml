name: Build data

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b build-data
          uv run contributor-network fetch
          uv run contributor-network build
          git add .
          git commit -m "chore: update data"
          git push -u origin build-data

  create-pr:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: generate-token
        with:
          app-id: ${{ secrets.DS_RELEASE_BOT_ID }}
          private-key: ${{ secrets.DS_RELEASE_BOT_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          ref: build-data
          fetch-depth: 0
      - name: Create PR
        run: gh pr create --fill
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
